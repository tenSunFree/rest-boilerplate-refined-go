name: Go CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Format / Static Analysis / Unit Testing / Build
  ci:
    name: Format, Vet, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # Automatically read the go version of go.mod (currently 1.25.0)
          cache: true               # Cache $GOPATH/pkg/mod to speed up module downloads

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies          # Confirm that go.sum matches the actual downloaded module.
        run: go mod verify

      # gofmt -l Lists unformatted files; exit if output is available.
      - name: Check Go format
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下檔案未格式化，請在本機執行 gofmt -w . 後再 push："
            echo "$unformatted"
            exit 1
          fi
          echo "所有檔案格式正確"

      # go vet is an officially built-in static analysis tool; it's low-cost and should be retained indefinitely.
      - name: Go vet
        run: go vet ./...

      # Configure the `.golangci.yml` file in the corresponding project root directory for golangci-lint
      # Pin the version to prevent CI from failing unexpectedly due to lint tool upgrades
      - name: Static analysis (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      # Unit tests: Run quick mock-based tests without `-tags=integration`
      # `-race` → Detect data races (a powerful feature specific to Go)
      # `-count=1` → Disable test caching, ensuring that tests are actually executed every time.
      - name: Run unit tests
        run: go test -v -race -count=1 ./...

      # Build API server binary (corresponding to `go build ./cmd/api` in the Dockerfile)
      - name: Build API binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
            -o bin/api ./cmd/api

      # Build migration binary (the project has its own migration CLI)
      - name: Build migration binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
            -o bin/migrate ./cmd/migration

  # Integration Testing (Requires Docker, spin-up a real Postgres + Redis)
  # Corresponds to the test files marked with //go:build integration in the project
  integration-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest          # GitHub Actions runner with built-in Docker

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      # Testcontainers-go will automatically pull the image and start the container
      # No need to manually run `docker run` here
      - name: Run integration tests
        run: go test -v -race -count=1 -tags=integration -timeout=120s ./...